name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Needed to create the GitHub Release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-latest
    env:
      # Marketplace publish token (read by `publishPlugin`); empty when the
      # secret isn't set, which skips the publish step.
      JB_TOKEN: ${{ secrets.JB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Verify before publishing: only ship a plugin the JetBrains Plugin
      # Verifier accepts against the target IDE.
      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Checksums
        working-directory: build/distributions
        run: sha256sum *.zip > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/distributions/*.zip
            build/distributions/SHA256SUMS
          fail_on_unmatched_files: true

      # Uploads to the JetBrains Marketplace. The plugin listing must already
      # exist there (the first version is uploaded manually); this fails loudly
      # until then. Runs last so a Marketplace error doesn't block the GitHub
      # Release. Skipped automatically when JB_TOKEN isn't configured.
      - name: Publish to JetBrains Marketplace
        if: env.JB_TOKEN != ''
        run: ./gradlew publishPlugin
