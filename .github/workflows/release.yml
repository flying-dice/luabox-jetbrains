name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed to create the tag, the GitHub Release, and upload the asset.
permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release on version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, to detect an existing release

      - name: Read plugin version
        id: meta
        run: |
          version=$(grep -E '^pluginVersion' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$version already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Releasing v$version."
          fi

      - name: Set up JDK 21
        if: steps.meta.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        if: steps.meta.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Test & build plugin
        if: steps.meta.outputs.exists == 'false'
        run: ./gradlew test buildPlugin

      - name: Create GitHub Release
        if: steps.meta.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: build/distributions/*.zip
          fail_on_unmatched_files: true
