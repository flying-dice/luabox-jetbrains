<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 512 512" role="img" aria-label="PseudoScript">
  <title>PseudoScript</title>
  <!-- Monochrome badge: the "PDS" letters are knocked out so they show the
       stripe behind, matching the IDE's grey tool-window / menu icon style. -->
  <mask id="pds-knockout">
    <rect width="512" height="512" rx="64" ry="64" fill="#fff"/>
    <text x="478" y="452" text-anchor="end"
          font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="800" font-size="176" letter-spacing="-8" fill="#000">PDS</text>
  </mask>
  <rect width="512" height="512" rx="64" ry="64" fill="#6E6E6E" mask="url(#pds-knockout)"/>
</svg>
