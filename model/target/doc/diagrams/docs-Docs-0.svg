<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 752 396" width="752" height="396" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#d4d7dd"/></marker><filter id="cardlift" x="-12%" y="-12%" width="124%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.12"/></filter></defs><g font-family="Helvetica, Arial, sans-serif"><rect x="24" y="24" width="704" height="214" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="36" y="43" font-size="13" font-weight="700" fill="#d4d7dd">PseudoScriptPlugin</text><rect x="40" y="68" width="672" height="154" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="52" y="87" font-size="13" font-weight="700" fill="#d4d7dd">Docs</text><rect x="56" y="112" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M61,112 H348 A8,8 0 0 1 356,120 V198 A8,8 0 0 1 348,206 H61 Z" fill="#2b2d31"/><rect x="56" y="112" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="75" y="132" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="75" y="152" font-size="15" font-weight="700" fill="#d4d7dd">DocsPanel</text><text x="75" y="170" font-size="11.5" fill="#9a9ea8">Embedded live preview: runs `pds doc</text><text x="75" y="185" font-size="11.5" fill="#9a9ea8">--watch` on a free port, loads the served…</text><rect x="396" y="112" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M401,112 H688 A8,8 0 0 1 696,120 V198 A8,8 0 0 1 688,206 H401 Z" fill="#2b2d31"/><rect x="396" y="112" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="415" y="132" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="415" y="152" font-size="15" font-weight="700" fill="#d4d7dd"