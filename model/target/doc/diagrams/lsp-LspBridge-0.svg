<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 929 557" width="929" height="557" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#d4d7dd"/></marker><filter id="cardlift" x="-12%" y="-12%" width="124%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.12"/></filter></defs><g font-family="Helvetica, Arial, sans-serif"><rect x="6" y="6" width="348" height="527" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="18" y="25" font-size="13" font-weight="700" fill="#d4d7dd">LspBridge</text><rect x="30" y="30" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M35,30 H322 A8,8 0 0 1 330,38 V116 A8,8 0 0 1 322,124 H35 Z" fill="#2b2d31"/><rect x="30" y="30" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="50" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="49" y="70" font-size="15" font-weight="700" fill="#d4d7dd">ServerFactory</text><text x="49" y="88" font-size="11.5" fill="#9a9ea8">Hands LSP4IJ the connection provider for the</text><text x="49" y="103" font-size="11.5" fill="#9a9ea8">`pseudoscript` server.</text><rect x="30" y="261" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M35,261 H322 A8,8 0 0 1 330,269 V347 A8,8 0 0 1 322,355 H35 Z" fill="#2b2d31"/><rect x="30" y="261" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="281" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="49" y="301" font-size="15" font-weight="700" fill="#d4d7dd">LanguageServer</text><text x="49" y="319" font-size="11.5" fill="#9a9ea8">The launcher LSP4IJ starts: it spawns `pds</text><text x="49" y="334" font-size="11.5" fill="#9a9ea8">lsp` with the project root as the working…<