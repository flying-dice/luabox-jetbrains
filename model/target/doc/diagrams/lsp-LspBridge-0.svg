ight="94" rx="8" fill="#e23b2e" filter="url(#cardlift)"/><path d="M610,338 H897 A8,8 0 0 1 905,346 V424 A8,8 0 0 1 897,432 H610 Z" fill="#2b2d31"/><rect x="605" y="338" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="624" y="358" font-size="10" letter-spacing="1.5" font-weight="600" fill="#e23b2e">SYSTEM</text><text x="624" y="378" font-size="15" font-weight="700" fill="#d4d7dd">Pds</text><text x="624" y="396" font-size="11.5" fill="#9a9ea8">The `pds` toolchain the plugin shells out to</text><text x="624" y="411" font-size="11.5" fill="#9a9ea8">— modelled in full by the `pseudoscript`…</text><path d="M330,77 L534,77 L575,77 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,298 L514,274 L576,260 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,308 L540,308 L588,295 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,320 L462,342 L576,364 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><rect x="415" y="69" width="106" height="16" rx="4" fill="#2b2d31e6"/><text x="468" y="81" text-anchor="middle" font-size="11.5" fill="#9a9ea8">registerServer</text><rect x="426" y="262" width="85" height="16" rx="4" fill="#2b2d31e6"/><text x="468" y="274" text-anchor="middle" font-size="11.5" fill="#9a9ea8">isAvailable</text><rect x="412" y="300" width="113" height="16" rx="4" fill="#2b2d31e6"/><text x="468" y="312" text-anchor="middle" font-size="11.5" fill="#9a9ea8">notFoundMessage</text><rect x="454" y="339" width="29" height="16" rx="4" fill="#2b2d31e6"/><text x="468" y="351" text-anchor="middle" font-size="11.5" fill="#9a9ea8">lsp</text></g></svg>