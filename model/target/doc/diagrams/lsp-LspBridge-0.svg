<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1134 562" width="1134" height="562" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#d4d7dd"/></marker><filter id="cardlift" x="-12%" y="-12%" width="124%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.12"/></filter></defs><g font-family="Helvetica, Arial, sans-serif"><rect x="24" y="24" width="1086" height="364" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="36" y="43" font-size="13" font-weight="700" fill="#d4d7dd">PseudoScriptPlugin</text><rect x="40" y="68" width="1054" height="154" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="52" y="87" font-size="13" font-weight="700" fill="#d4d7dd">LspBridge</text><rect x="56" y="112" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M61,112 H348 A8,8 0 0 1 356,120 V198 A8,8 0 0 1 348,206 H61 Z" fill="#2b2d31"/><rect x="56" y="112" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="75" y="132" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="75" y="152" font-size="15" font-weight="700" fill="#d4d7dd">ServerFactory</text><text x="75" y="170" font-size="11.5" fill="#9a9ea8">Hands LSP4IJ the connection provider for the</text><text x="75" y="185" font-size="11.5" fill="#9a9ea8">`pseudoscript` server.</text><rect x="438" y="112" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M443,112 H730 A8,8 0 0 1 738,120 V198 A8,8 0 0 1 730,206 H443 Z" fill="#2b2d31"/><rect x="438" y="112" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="457" y="132" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="457" y="152" font-size="15" font-weight="700" fill="#d4d7dd">LanguageServer</text><text x="457" y="170" font-size="11.5" fill="#9a9ea8">The launcher LSP4IJ starts: it spawns `pds</text><text x="457" y="185" font-size="11.5" fill="#9a9ea8">lsp` with the project root as the working…</text><rect x="778" y="112" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M783,112 H1070 A8,8 0 0 1 1078,120 V198 A8,8 0 0 1 1070,206 H783 Z" fill="#2b2d31"/><rect x="778" y="112" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="797" y="132" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="797" y="152" font-size="15" font-weight="700" fill="#d4d7dd">SemanticTokens</text><text x="797" y="170" font-size="11.5" fill="#9a9ea8">Maps `pds lsp` semantic tokens onto the</text><text x="797" y="185" font-size="11.5" fill="#9a9ea8">plugin&apos;s colour keys. The two layers must…</text><rect x="247" y="278" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M252,278 H539 A8,8 0 0 1 547,286 V364 A8,8 0 0 1 539,372 H252 Z" fill="#2b2d31"/><rect x="247" y="278" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="266" y="298" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="266" y="318" font-size="15" font-weight="700" fill="#d4d7dd">Configuration</text><text x="266" y="336" font-size="11.5" fill="#9a9ea8">Settings, binary detection, and user-facing</text><text x="266" y="351" font-size="11.5" fill="#9a9ea8">setup guidance. The availability check is…</text><rect x="778" y="444" width="300" height="94" rx="8" fill="#e23b2e" filter="url(#cardlift)"/><path d="M783,444 H1070 A8,8 0 0 1 1078,452 V530 A8,8 0 0 1 1070,538 H783 Z" fill="#2b2d31"/><rect x="778" y="444" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="797" y="464" font-size="10" letter-spacing="1.5" font-weight="600" fill="#e23b2e">SYSTEM</text><text x="797" y="484" font-size="15" font-weight="700" fill="#d4d7dd">Lsp4ij</text><text x="797" y="502" font-size="11.5" fill="#9a9ea8">The LSP4IJ client runtime — a required</text><text x="797" y="517" font-size="11.5" fill="#9a9ea8">companion IDE plugin. Owns the LSP lifecycl…</text><rect x="438" y="444" width="300" height="94" rx="8" fill="#e23b2e" filter="url(#cardlift)"/><path d="M443,444 H730 A8,8 0 0 1 738,452 V530 A8,8 0 0 1 730,538 H443 Z" fill="#2b2d31"/><rect x="438" y="444" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="457" y="464" font-size="10" letter-spacing="1.5" font-weight="600" fill="#e23b2e">SYSTEM</text><text x="457" y="484" font-size="15" font-weight="700" fill="#d4d7dd">Pds</text><text x="457" y="502" font-size="11.5" fill="#9a9ea8">The `pds` toolchain the plugin shells out to</text><text x="457" y="517" font-size="11.5" fill="#9a9ea8">— modelled in full by the `pseudoscript`…</text><path d="M534,206 L527,212 L520,218 L513,224 L506,230 L499,236 L492,242 L486,248 L479,254 L472,260 L465,266 L458,272 L451,278 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><rect x="436" y="227" width="113" height="30" rx="4" fill="#2b2d31e6"/><text x="492" y="239" text-anchor="middle" font-size="11.5" fill="#9a9ea8"><tspan x="492" dy="0">isAvailable</tspan><tspan x="492" dy="14">notFoundMessage</tspan></text><path d="M588,206 L588,212 L588,219 L588,227 L588,237 L588,247 L588,258 L588,269 L588,281 L588,292 L588,304 L588,315 L588,325 L588,335 L588,346 L588,358 L588,369 L588,381 L588,392 L588,403 L588,413 L588,423 L588,431 L588,438 L588,444 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><rect x="574" y="317" width="29" height="16" rx="4" fill="#2b2d31e6"/><text x="588" y="329" text-anchor="middle" font-size="11.5" fill="#9a9ea8"><tspan x="588" dy="0">lsp</tspan></text><path d="M206,206 L204,212 L199,219 L193,227 L185,236 L177,247 L170,257 L165,269 L164,280 L166,292 L173,303 L186,314 L206,325 L235,336 L275,348 L322,360 L375,373 L433,386 L492,398 L551,410 L609,422 L662,433 L709,442 L749,450 L778,457 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><rect x="153" y="317" width="106" height="16" rx="4" fill="#2b2d31e6"/><text x="206" y="329" text-anchor="middle" font-size="11.5" fill="#9a9ea8"><tspan x="206" dy="0">registerServer</tspan></text></g></svg>