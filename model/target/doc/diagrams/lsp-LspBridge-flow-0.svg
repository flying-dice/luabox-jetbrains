<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 430" width="380" height="430" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#b7bbc3"/></marker></defs><g font-family="Helvetica, Arial, sans-serif"><text x="20" y="22" font-size="10" letter-spacing="2" fill="#9a9ea8">FEATURE</text><text x="20" y="44" font-size="17" font-weight="700" fill="#d4d7dd">ArchitecturalLintsAreFlagged</text><text x="20" y="60" font-size="11.5" fill="#9a9ea8">for LspBridge</text><line x1="190" y1="131" x2="190" y2="159" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="224" x2="190" y2="252" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="317" x2="190" y2="345" stroke="#9a9ea8" marker-end="url(#arrow)"/><rect x="20" y="66" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="66" width="5" height="65" rx="2" fill="#4f72f0"/><text x="36" y="84" font-size="10" letter-spacing="1.5" font-weight="600" fill="#4f72f0">GIVEN</text><text x="36" y="102" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">a model with a cross-module call that</tspan><tspan x="36" dy="17">bypasses a published face</tspan></text><rect x="20" y="159" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="159" width="5" height="65" rx="2" fill="#c77f10"/><text x="36" y="177" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">WHEN</text><text x="36" y="195" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">the file is open with the language</tspan><tspan x="36" dy="17">server running</tspan></text><rect x="20" y="252" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="252" width="5" height="65" rx="2" fill="#0f9d8a"/><text x="36" y="270" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">THEN</text><text x="36" y="288" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">the offending call is underlined as a</tspan><tspan x="36" dy="17">warning</tspan></text><rect x="20" y="345" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="345" width="5" height="65" rx="2" fill="#9a9ea8"/><text x="36" y="363" font-size="10" letter-spacing="1.5" font-weight="600" fill="#9a9ea8">AND</text><text x="36" y="381" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">its tooltip names the PDS-ARCH code</tspan><tspan x="36" dy="17">and links the principle&apos;s article</tspan></text></g></svg>