<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 548" width="380" height="548" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#b7bbc3"/></marker></defs><g font-family="Helvetica, Arial, sans-serif"><text x="20" y="22" font-size="10" letter-spacing="2" fill="#9a9ea8">FEATURE</text><text x="20" y="44" font-size="17" font-weight="700" fill="#d4d7dd">SelectingANodeRenders</text><text x="20" y="60" font-size="11.5" fill="#9a9ea8">for DiagramEditor</text><line x1="190" y1="114" x2="190" y2="142" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="190" x2="190" y2="218" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="283" x2="190" y2="311" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="376" x2="190" y2="404" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="452" x2="190" y2="480" stroke="#9a9ea8" marker-end="url(#arrow)"/><rect x="20" y="66" width="340" height="48" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="66" width="5" height="48" rx="2" fill="#4f72f0"/><text x="36" y="84" font-size="10" letter-spacing="1.5" font-weight="600" fill="#4f72f0">GIVEN</text><text x="36" y="102" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">the structure tree is populated</tspan></text><rect x="20" y="142" width="340" height="48" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="142" width="5" height="48" rx="2" fill="#c77f10"/><text x="36" y="160" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">WHEN</text><text x="36" y="178" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">the developer opens a symbol&apos;s diagram</tspan></text><rect x="20" y="218" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="218" width="5" height="65" rx="2" fill="#0f9d8a"/><text x="36" y="236" font-size="10" letter-spacing="1.5" font-weight=