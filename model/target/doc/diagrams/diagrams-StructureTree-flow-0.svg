<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 506" width="380" height="506" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#b7bbc3"/></marker></defs><g font-family="Helvetica, Arial, sans-serif"><text x="20" y="22" font-size="10" letter-spacing="2" fill="#9a9ea8">FEATURE</text><text x="20" y="44" font-size="17" font-weight="700" fill="#d4d7dd">StructureTreeListsWorkspaces</text><text x="20" y="60" font-size="11.5" fill="#9a9ea8">for StructureTree</text><line x1="190" y1="131" x2="190" y2="159" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="207" x2="190" y2="235" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="300" x2="190" y2="328" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="393" x2="190" y2="421" stroke="#9a9ea8" marker-end="url(#arrow)"/><rect x="20" y="66" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="66" width="5" height="65" rx="2" fill="#4f72f0"/><text x="36" y="84" font-size="10" letter-spacing="1.5" font-weight="600" fill="#4f72f0">GIVEN</text><text x="36" y="102" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">a repository holding one or more</tspan><tspan x="36" dy="17">`pds.toml` workspaces</tspan></text><rect x="20" y="159" width="340" height="48" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="159" width="5" height="48" rx="2" fill="#c77f10"/><text x="36" y="177" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">WHEN</text><text x="36" y="195" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">the Structure tab refreshes</tspan></text><rect x="20" y="235" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="235" width="5" height="65" rx="2" fill="#0f9d8a"/><text x="36" y="253" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">THEN</text><text x="36" y="271" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">each workspace&apos;s symbols appear,</tspan><tspan x="36" dy="17">nested by their parent</tspan></text><rect x="20" y="328" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="328" width="5" height="65" rx="2" fill="#9a9ea8"/><text x="36" y="346" font-size="10" letter-spacing="1.5" font-weight="600" fill="#9a9ea8">AND</text><text x="36" y="364" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">features appear under their target</tspan><tspan x="36" dy="17">with their own icon</tspan></text><rect x="20" y="421" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="421" width="5" height="65" rx="2" fill="#9a9ea8"/><text x="36" y="439" font-size="10" letter-spacing="1.5" font-weight="600" fill="#9a9ea8">AND</text><text x="36" y="457" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">flow entry points are marked</tspan><tspan x="36" dy="17">distinctly from structural nodes</tspan></text></g></svg>