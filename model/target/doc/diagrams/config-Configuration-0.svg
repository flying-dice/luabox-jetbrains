<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1018 550" width="1018" height="550" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#d4d7dd"/></marker><filter id="cardlift" x="-12%" y="-12%" width="124%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.12"/></filter></defs><g font-family="Helvetica, Arial, sans-serif"><rect x="6" y="6" width="988" height="450" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="18" y="25" font-size="13" font-weight="700" fill="#d4d7dd">Configuration</text><rect x="670" y="30" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M675,30 H962 A8,8 0 0 1 970,38 V116 A8,8 0 0 1 962,124 H675 Z" fill="#2b2d31"/><rect x="670" y="30" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="689" y="50" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="689" y="70" font-size="15" font-weight="700" fill="#d4d7dd">Settings</text><text x="689" y="88" font-size="11.5" fill="#9a9ea8">Application-wide persistent store of the</text><text x="689" y="103" font-size="11.5" fill="#9a9ea8">`pds` binary path. A blank value falls back…</text><rect x="670" y="338" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M675,338 H962 A8,8 0 0 1 970,346 V424 A8,8 0 0 1 962,432 H675 Z" fill="#2b2d31"/><rect x="670" y="338" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="689" y="358" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="689" y="378" font-size="15" font-weight="700" fill="#d4d7dd">BinaryCheck</text><text x="689" y="396" font-size="11.5" fill="#9a9ea8">&quot;Can we reach `pds`?&quot; — the single check the</text><text x="689" y="411" font-size="11.5" fill="#9a9ea8">LSP launcher, the banner, and the diagram…</text><rect x="30" y="107" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M35,107 H322 A8,8 0 0 1 330,115 V193 A8,8 0 0 1 322,201 H35 Z" fill="#2b2d31"/><rect x="30" y="107" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="127" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="49" y="147" font-size="15" font-weight="700" fill="#d4d7dd">SettingsForm</text><text x="49" y="165" font-size="11.5" fill="#9a9ea8">The settings page (Settings &gt; Languages &amp;</text><text x="49" y="180" font-size="11.5" fill="#9a9ea8">Frameworks &gt; PseudoScript).</text><rect x="30" y="278" width="300" height="94" rx="8" fill="#c77f10" filter="url(#cardlift)"/><path d="M35,278 H322 A8,8 0 0 1 330,286 V364 A8,8 0 0 1 322,372 H35 Z" fill="#2b2d31"/><rect x="30" y="278" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="298" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">COMPONENT</text><text x="49" y="318" font-size="15" font-weight="700" fill="#d4d7dd">MissingBinaryBanner</text><text x="49" y="336" font-size="11.5" fill="#9a9ea8">Warns atop `.pds` / `pds.toml` files when</text><text x="49" y="351" font-size="11.5" fill="#9a9ea8">the binary is missing — highlighting still…</text><rect x="30" y="432" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M35,432 H322 A8,8 0 0 1 330,440 V518 A8,8 0 0 1 322,526 H35 Z" fill="#2b2d31"/><rect x="30" y="432" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="452" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="49" y="472" font-size="15" font-weight="700" fill="#d4d7dd">LspBridge</text><text x="49" y="490" font-size="11.5" fill="#9a9ea8">Wires the `pds lsp` language server into the</text><text x="49" y="505" font-size="11.5" fill="#9a9ea8">IDE via LSP4IJ.</text><rect x="670" y="184" width="300" height="94" rx="8" fill="#e23b2e" filter="url(#cardlift)"/><path d="M675,184 H962 A8,8 0 0 1 970,192 V270 A8,8 0 0 1 962,278 H675 Z" fill="#2b2d31"/><rect x="670" y="184" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="689" y="204" font-size="10" letter-spacing="1.5" font-weight="600" fill="#e23b2e">SYSTEM</text><text x="689" y="224" font-size="15" font-weight="700" fill="#d4d7dd">Intellij</text><text x="689" y="242" font-size="11.5" fill="#9a9ea8">The host IDE platform (IntelliJ). Provides</text><text x="689" y="257" font-size="11.5" fill="#9a9ea8">the editor, tool windows, file types, and…</text><path d="M330,145 L540,120 L641,100 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,162 L605,188 L642,195 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,332 L547,351 L640,366 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,342 L483,385 L640,385 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,470 L547,445 L641,419 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><path d="M330,482 L574,501 L660,450 " fill="none" stroke="#d4d7dd" marker-end="url(#arrow)"/><rect x="461" y="108" width="78" height="16" rx="4" fill="#2b2d31e6"/><text x="500" y="120" text-anchor="middle" font-size="11.5" fill="#9a9ea8">setPdsPath</text><rect x="426" y="185" width="148" height="16" rx="4" fill="#2b2d31e6"/><text x="500" y="197" text-anchor="middle" font-size="11.5" fill="#9a9ea8">refreshNotifications</text><rect x="458" y="347" width="85" height="16" rx="4" fill="#2b2d31e6"/><text x="500" y="359" text-anchor="middle" font-size="11.5" fill="#9a9ea8">isAvailable</text><rect x="354" y="377" width="113" height="16" rx="4" fill="#2b2d31e6"/><text x="410" y="389" text-anchor="middle" font-size="11.5" fill="#9a9ea8">notFoundMessage</text><rect x="458" y="432" width="85" height="16" rx="4" fill="#2b2d31e6"/><text x="500" y="444" text-anchor="middle"