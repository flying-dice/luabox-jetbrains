<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1616 520" width="1616" height="520" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#d4d7dd"/></marker><filter id="cardlift" x="-12%" y="-12%" width="124%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.12"/></filter></defs><g font-family="Helvetica, Arial, sans-serif"><rect x="49" y="24" width="1543" height="320" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="61" y="43" font-size="13" font-weight="700" fill="#d4d7dd">PseudoScriptPlugin</text><rect x="256" y="234" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M261,234 H548 A8,8 0 0 1 556,242 V320 A8,8 0 0 1 548,328 H261 Z" fill="#2b2d31"/><rect x="256" y="234" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="275" y="254" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="275" y="274" font-size="15" font-weight="700" fill="#d4d7dd">Configuration</text><text x="275" y="292" font-size="11.5" fill="#9a9ea8">Settings, binary detection, and user-facing</text><text x="275" y="307" font-size="11.5" fill="#9a9ea8">setup guidance. The availability check is…</text><rect x="596" y="234" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M601,234 H888 A8,8 0 0 1 896,242 V320 A8,8 0 0 1 888,328 H601 Z" fill="#2b2d31"/><rect x="596" y="234" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="615" y="254" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="615" y="274" font-size="15" font-weight="700" fill="#d4d7dd">Diagrams</text><text x="615" y="292" font-size="11.5" fill="#9a9ea8">The Structure tree and the SVG diagram</text><text x="615" y="307" font-size="11.5" fill="#9a9ea8">editor, plus the right-click action, the…</text><rect x="936" y="234" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M941,234 H1228 A8,8 0 0 1 1236,242 V320 A8,8 0 0 1 1228,328 H941 Z" fill="#2b2d31"/><rect x="936" y="234" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="955" y="254" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="955" y="274" font-size="15" font-weight="700" fill="#d4d7dd">Docs</text><text x="955" y="292" font-size="11.5" fill="#9a9ea8">The Docs tab (live preview) and the Build /</text><text x="955" y="307" font-size="11.5" fill="#9a9ea8">Serve Docs actions.</text><rect x="1276" y="234" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M1281,234 H1568 A8,8 0 0 1 1576,242 V320 A8,8 0 0 1 1568,328 H1281 Z" fill="#2b2d31"/><rect x="1276" y="234" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="1295" y="254" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="1295" y="274" font-size="15" font-weight="700" fill="#d4d7dd">LanguageSupport</text><text x="1295" y="292" font-size="11.5" fill="#9a9ea8">Registers `.pds` as a language and paints it</text><text x="1295" y="307" font-size="11.5" fill="#9a9ea8">from the lexer alone — the one capability…</text><rect x="65" y="68" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M70,68 H357 A8,8 0 0 1 365,76 V154 A8,8 0 0 1 357,162 H70 Z" fill="#2b2d31"/><rect x="65" y="68" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="84" y="88" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="84" y="108" font-size="15" font-weight="700" fill="#d4d7dd">LspBridge</text><text x="84" y="126" font-size="11.5" fill="#9a9ea8">Wires the `pds lsp` language server into the</text><text x="84" y="141" font-size="11.5" fill="#9a9ea8">IDE via LSP4IJ.</text><rect x="364" y="402" width="300" height="94" rx="8" fill="#e23b2e" filter="url(#cardlift)"/><path d="M369,402 H656 A8,8 0 0 1 664,410 V488 A8,8 0 0 1 656,496 H369 Z" fill="#2b2d31"/><rect x="364" y="402" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="383" y="422" font-size="10" letter-spacing="1.5" font-weight="600" fill="#e23b2e">SYSTEM</text><text x="383" y="442" font-size="15" font-weight="700" fill="#d4d7dd">Intellij</text><text x="383" y="460" font-size="11.5" fill="#9a9ea8">The host IDE platform (IntelliJ). Provides</text><text x="383" y="475" font-size="11.5" fill="#9a9ea8">the editor, tool windows, file types, and…</text><rect x="24" y="402" width="300" height="94" rx="8" fill="#e23b2e" filter="url(#cardlift)"/><path d="M29,402 H316 A8,8 0 0 1 324,410 V488 A8,8 0 0 1 316,496 H29 Z" fill="#2b2d31"/><rect x="24" y="402" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="43" y="422" font-size="10" letter-spacing="1.5" font-weight="600" fill="#e23b2e">SYSTEM</text><text x="43" y="442" font-size="15" font-weight="700" fill="#d4d7dd">Lsp4ij</text><text x="43" y="460" font-size="11.5" fill="#9a9ea8">The LSP4IJ client runtime — a required</text><text x="43" y="475" font-size="11.5" fill="#9a9ea8">companion IDE plugin. Owns the LSP lifecycl…</text><rect x="704" y="402" width="300" height="94" rx="8" fill="#e23b2e" filter="url(#cardlift)"/><path d="M709,402 H996 A8,8 0 0 1 1004,410 V488 A8,8 0 0 1 996,496 H709 Z" fill="#2b2d31"/><rect x="704" y="402" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="723" y="422" font-size="10" letter-spacing="1.5" font-weight="600" fill="#e23b2e">SYSTEM</text><text x="723" y="442" font-size="15" font-weight="700" fill="#d4d7dd">Pds</text><text x="723" y="460" font-size="11.5" fill="#9a9ea8">The `pds` toolchain the plugin shells out to</text><text x="723" y="475" font-size="11.5" fill="#9a9ea8">— modelled in full by the `pseudoscript`…</text><path d="M436,328 L440,334 L4