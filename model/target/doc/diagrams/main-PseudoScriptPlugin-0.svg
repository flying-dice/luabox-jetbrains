<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1569 712" width="1569" height="712" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#d4d7dd"/></marker><filter id="cardlift" x="-12%" y="-12%" width="124%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.12"/></filter></defs><g font-family="Helvetica, Arial, sans-serif"><rect x="6" y="6" width="923" height="682" rx="12" fill="#26282d" stroke="#44474e" stroke-dasharray="6 5"/><text x="18" y="25" font-size="13" font-weight="700" fill="#d4d7dd">PseudoScriptPlugin</text><rect x="605" y="30" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M610,30 H897 A8,8 0 0 1 905,38 V116 A8,8 0 0 1 897,124 H610 Z" fill="#2b2d31"/><rect x="605" y="30" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="624" y="50" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="624" y="70" font-size="15" font-weight="700" fill="#d4d7dd">Configuration</text><text x="624" y="88" font-size="11.5" fill="#9a9ea8">Settings, binary detection, and user-facing</text><text x="624" y="103" font-size="11.5" fill="#9a9ea8">setup guidance.</text><rect x="30" y="415" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M35,415 H322 A8,8 0 0 1 330,423 V501 A8,8 0 0 1 322,509 H35 Z" fill="#2b2d31"/><rect x="30" y="415" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="435" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="49" y="455" font-size="15" font-weight="700" fill="#d4d7dd">Diagrams</text><text x="49" y="473" font-size="11.5" fill="#9a9ea8">The Structure tree and the SVG diagram</text><text x="49" y="488" font-size="11.5" fill="#9a9ea8">editor, plus the right-click action and the…</text><rect x="30" y="570" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M35,570 H322 A8,8 0 0 1 330,578 V656 A8,8 0 0 1 322,664 H35 Z" fill="#2b2d31"/><rect x="30" y="570" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="590" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="49" y="610" font-size="15" font-weight="700" fill="#d4d7dd">Docs</text><text x="49" y="628" font-size="11.5" fill="#9a9ea8">The Docs tab (live preview) and the Build /</text><text x="49" y="643" font-size="11.5" fill="#9a9ea8">Serve Docs actions.</text><rect x="30" y="261" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M35,261 H322 A8,8 0 0 1 330,269 V347 A8,8 0 0 1 322,355 H35 Z" fill="#2b2d31"/><rect x="30" y="261" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="281" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="49" y="301" font-size="15" font-weight="700" fill="#d4d7dd">LanguageSupport</text><text x="49" y="319" font-size="11.5" fill="#9a9ea8">Registers `.pds` as a language and paints it</text><text x="49" y="334" font-size="11.5" fill="#9a9ea8">from the lexer alone — the one capability…</text><rect x="30" y="107" width="300" height="94" rx="8" fill="#0f9d8a" filter="url(#cardlift)"/><path d="M35,107 H322 A8,8 0 0 1 330,115 V193 A8,8 0 0 1 322,201 H35 Z" fill="#2b2d31"/><rect x="30" y="107" width="300" height="94" rx="8" fill="none" stroke="#44474e"/><text x="49" y="127" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">CONTAINER</text><text x="49" y="147" font-size="15" font-weight="700" fill="#d4d7dd">LspBridge</text><text x="49" y="165" font-size="11.5" fill="#9a9ea8">Wires the `pds lsp` language server into the</text><text x="49" y="180" font-size="11.5" fill="#9a9ea8">IDE via LSP4IJ.</text><rect x="1245" y="30" width="300" height="94" rx="8" fill="#e23b