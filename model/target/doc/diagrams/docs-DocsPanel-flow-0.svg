<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 489" width="380" height="489" font-family="sans-serif" font-size="13"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#b7bbc3"/></marker></defs><g font-family="Helvetica, Arial, sans-serif"><text x="20" y="22" font-size="10" letter-spacing="2" fill="#9a9ea8">FEATURE</text><text x="20" y="44" font-size="17" font-weight="700" fill="#d4d7dd">LiveDocsPreview</text><text x="20" y="60" font-size="11.5" fill="#9a9ea8">for DocsPanel</text><line x1="190" y1="114" x2="190" y2="142" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="190" x2="190" y2="218" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="283" x2="190" y2="311" stroke="#9a9ea8" marker-end="url(#arrow)"/><line x1="190" y1="376" x2="190" y2="404" stroke="#9a9ea8" marker-end="url(#arrow)"/><rect x="20" y="66" width="340" height="48" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="66" width="5" height="48" rx="2" fill="#4f72f0"/><text x="36" y="84" font-size="10" letter-spacing="1.5" font-weight="600" fill="#4f72f0">GIVEN</text><text x="36" y="102" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">a workspace with a `pds.toml`</tspan></text><rect x="20" y="142" width="340" height="48" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="142" width="5" height="48" rx="2" fill="#c77f10"/><text x="36" y="160" font-size="10" letter-spacing="1.5" font-weight="600" fill="#c77f10">WHEN</text><text x="36" y="178" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">the developer runs Build &amp; Serve Docs</tspan></text><rect x="20" y="218" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="218" width="5" height="65" rx="2" fill="#0f9d8a"/><text x="36" y="236" font-size="10" letter-spacing="1.5" font-weight="600" fill="#0f9d8a">THEN</text><text x="36" y="254" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">`pds doc` serves the site locally on a</tspan><tspan x="36" dy="17">free port</tspan></text><rect x="20" y="311" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="311" width="5" height="65" rx="2" fill="#9a9ea8"/><text x="36" y="329" font-size="10" letter-spacing="1.5" font-weight="600" fill="#9a9ea8">AND</text><text x="36" y="347" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">it loads in an embedded browser and</tspan><tspan x="36" dy="17">reloads as files change</tspan></text><rect x="20" y="404" width="340" height="65" rx="8" fill="#2b2d31" stroke="#44474e"/><rect x="20" y="404" width="5" height="65" rx="2" fill="#9a9ea8"/><text x="36" y="422" font-size="10" letter-spacing="1.5" font-weight="600" fill="#9a9ea8">AND</text><text x="36" y="440" font-size="13" fill="#d4d7dd"><tspan x="36" dy="0">an IDE without JCEF opens the site in</tspan><tspan x="36" dy="17">the system browser instead</tspan></text></g></svg>