# Plugin coordinates
pluginGroup = com.luabox
pluginName = luabox
pluginVersion = 0.2.1

# Compatibility range (build numbers). 251 = 2025.1.
pluginSinceBuild = 251
pluginUntilBuild = 261.*

# Target IDE for development and verification.
# IIC = IntelliJ IDEA Community. Works in Ultimate too.
platformType = IC
platformVersion = 2025.1

# LSP4IJ provides the LSP client runtime. The plugin depends on it at runtime;
# users install it from the Marketplace (declared in plugin.xml <depends>).
lsp4ijVersion = 0.19.4

# JVM / Kotlin
kotlin.stdlib.default.dependency = false
org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC
org.gradle.caching = true
org.gradle.configuration-cache = true
